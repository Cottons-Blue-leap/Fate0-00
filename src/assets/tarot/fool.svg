<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- The Fool: 절벽 끝에서 한 발을 내딛는 여행자 -->
  <defs>
    <linearGradient id="fool-glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c9a0dc"/>
      <stop offset="100%" stop-color="#7b2faf"/>
    </linearGradient>
  </defs>
  <!-- 별 (위) -->
  <circle cx="48" cy="10" r="2" fill="#c9a0dc" opacity="0.8"/>
  <circle cx="52" cy="16" r="1.2" fill="#c9a0dc" opacity="0.5"/>
  <!-- 여행자 실루엣 -->
  <circle cx="30" cy="16" r="6" stroke="url(#fool-glow)" stroke-width="1.8" fill="none"/>
  <line x1="30" y1="22" x2="30" y2="40" stroke="url(#fool-glow)" stroke-width="1.8" stroke-linecap="round"/>
  <!-- 팔: 지팡이를 든 팔 + 허공의 팔 -->
  <line x1="30" y1="28" x2="20" y2="24" stroke="url(#fool-glow)" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="30" y1="28" x2="42" y2="32" stroke="url(#fool-glow)" stroke-width="1.8" stroke-linecap="round"/>
  <!-- 지팡이 -->
  <line x1="18" y1="14" x2="22" y2="26" stroke="#c9a0dc" stroke-width="1.4" stroke-linecap="round"/>
  <!-- 보따리 -->
  <circle cx="17" cy="13" r="3.5" stroke="#c9a0dc" stroke-width="1.2" fill="none"/>
  <!-- 다리: 한 발은 절벽, 한 발은 허공 -->
  <line x1="30" y1="40" x2="24" y2="52" stroke="url(#fool-glow)" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="30" y1="40" x2="38" y2="50" stroke="url(#fool-glow)" stroke-width="1.8" stroke-linecap="round"/>
  <!-- 절벽 -->
  <path d="M4 54 L28 54 L28 58" stroke="#7b2faf" stroke-width="1.5" fill="none" opacity="0.6"/>
  <!-- 허공 (점선) -->
  <line x1="34" y1="56" x2="58" y2="56" stroke="#7b2faf" stroke-width="0.8" stroke-dasharray="2 3" opacity="0.3"/>
</svg>
