<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Death: 변화의 낫 — 장미가 피어나는 해골 -->
  <defs>
    <linearGradient id="death-glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c9a0dc"/>
      <stop offset="100%" stop-color="#7b2faf"/>
    </linearGradient>
  </defs>
  <!-- 해골 -->
  <ellipse cx="32" cy="18" rx="9" ry="10" stroke="url(#death-glow)" stroke-width="1.8" fill="none"/>
  <!-- 눈 -->
  <ellipse cx="28" cy="16" rx="2.5" ry="2.8" stroke="#c9a0dc" stroke-width="1.2" fill="none"/>
  <ellipse cx="36" cy="16" rx="2.5" ry="2.8" stroke="#c9a0dc" stroke-width="1.2" fill="none"/>
  <!-- 코 -->
  <path d="M31 20 L32 22 L33 20" stroke="#c9a0dc" stroke-width="1" fill="none" stroke-linecap="round"/>
  <!-- 턱선 -->
  <path d="M26 24 Q32 28 38 24" stroke="url(#death-glow)" stroke-width="1.2" fill="none"/>
  <!-- 낫 자루 -->
  <line x1="44" y1="8" x2="36" y2="52" stroke="#7b2faf" stroke-width="1.8" stroke-linecap="round"/>
  <!-- 낫 날 -->
  <path d="M44 8 Q56 6 54 16 Q50 14 44 12" stroke="#c9a0dc" stroke-width="1.5" fill="none" stroke-linejoin="round"/>
  <!-- 장미 (변화 = 새 생명) -->
  <circle cx="18" cy="48" r="4" stroke="#c9a0dc" stroke-width="1.2" fill="none"/>
  <path d="M18 44 Q20 46 18 48 Q16 46 18 44" stroke="#c9a0dc" stroke-width="0.8" fill="none"/>
  <line x1="18" y1="52" x2="18" y2="60" stroke="#7b2faf" stroke-width="1.2" stroke-linecap="round"/>
  <!-- 장미 잎 -->
  <path d="M18 56 Q14 54 16 58" stroke="#7b2faf" stroke-width="0.8" fill="none"/>
  <!-- 흩어지는 꽃잎 -->
  <ellipse cx="26" cy="44" rx="1.5" ry="1" fill="#c9a0dc" opacity="0.4" transform="rotate(-30 26 44)"/>
  <ellipse cx="12" cy="42" rx="1.2" ry="0.8" fill="#c9a0dc" opacity="0.3" transform="rotate(20 12 42)"/>
</svg>
