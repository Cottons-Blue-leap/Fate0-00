<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>운명 0시 - 개인정보처리방침</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 720px; margin: 0 auto; padding: 20px; background: #1a0a2e; color: #e0d0f0; line-height: 1.7; }
    h1 { color: #ffd700; border-bottom: 1px solid rgba(212,175,55,0.3); padding-bottom: 12px; }
    h2 { color: #c39bd3; margin-top: 40px; }
    h3 { color: #f1948a; }
    a { color: #9b59b6; }
    hr { border: none; border-top: 1px solid rgba(255,255,255,0.1); margin: 32px 0; }
    strong { color: #fff; }
  </style>
</head>
<body>
  <div id="content"></div>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    fetch('privacy-policy.md')
      .then(r => r.text())
      .then(md => { document.getElementById('content').innerHTML = marked.parse(md); });
  </script>
</body>
</html>
